name: CI

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_pump_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_pump_test

    steps:
      - uses: actions/checkout@v4

      - name: Install libpq for pg gem
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Remove Supabase-only extensions from schema
        run: |
          ruby -i -pe "gsub(/^\s*enable_extension \"graphql\.pg_graphql\"\n/, '')" db/schema.rb
          ruby -i -pe "gsub(/^\s*enable_extension \"vault\.supabase_vault\"\n/, '')" db/schema.rb

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      - name: Run RSpec
        run: bundle exec rspec
