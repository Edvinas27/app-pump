name: CI

# Runs on: pushes to any branch (feature branches, main, develop, …) and on PRs targeting main/master/develop.
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libpq for pg gem
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build
        run: bundle exec rails zeitwerk:check

  test:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_pump_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_pump_test

    steps:
      - uses: actions/checkout@v4

      - name: Install libpq for pg gem
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Remove Supabase-only extensions from schema
        run: |
          ruby -i -pe "gsub(/^\s*enable_extension \"graphql\.pg_graphql\"\n/, '')" db/schema.rb
          ruby -i -pe "gsub(/^\s*enable_extension \"vault\.supabase_vault\"\n/, '')" db/schema.rb

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      - name: Test
        run: bundle exec rspec
