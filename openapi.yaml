openapi: 3.0.3
info:
  title: App Pump API
  version: 1.0.0
  description: |
    API for authentication, car catalog selection flow, user cars, feedbacks, driving directions, and emissions.
    Directions require a valid JWT from `POST /sessions` or `POST /users` (`Authorization: Bearer <token>`).
servers:
  - url: http://127.0.0.1:3000
tags:
  - name: Health
  - name: Auth
  - name: Cars
  - name: UserCars
  - name: Feedbacks
  - name: Directions
  - name: Geocoding
  - name: Emissions
paths:
  /live:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK
  /ready:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK
  /up:
    get:
      tags: [Health]
      summary: Uptime probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /users:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created with JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorsResponse"

  /sessions:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: Neteisingas el. paštas arba slaptažodis

  /cars:
    get:
      tags: [Cars]
      summary: Get one exact car match
      parameters:
        - name: brand_name
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: fuel_type_id
          in: query
          schema: { type: integer }
        - name: year
          in: query
          schema: { type: integer }
        - name: co2_emission
          in: query
          schema: { type: number, format: float }
      responses:
        "200":
          description: Car found or empty array
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CarResponse"
                  - type: array
                    maxItems: 0
    post:
      tags: [Cars]
      summary: Create car in catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarCreateRequest"
      responses:
        "201":
          description: Car created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarRecord"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorsResponse"

  /cars/brands:
    get:
      tags: [Cars]
      summary: Get available brands
      responses:
        "200":
          description: Distinct brand names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /cars/models:
    get:
      tags: [Cars]
      summary: Get models for selected brand
      parameters:
        - name: brand_name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Distinct models for brand
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "422":
          description: Missing required params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: brand_name is required

  /cars/fuel_types:
    get:
      tags: [Cars]
      summary: Get fuel types for selected brand and model
      parameters:
        - name: brand_name
          in: query
          required: true
          schema:
            type: string
        - name: model
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fuel types for selected brand/model
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FuelType"
        "422":
          description: Missing required params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: brand_name and model are required

  /cars/years:
    get:
      tags: [Cars]
      summary: Get years for selected brand, model, fuel type
      parameters:
        - name: brand_name
          in: query
          required: true
          schema:
            type: string
        - name: model
          in: query
          required: true
          schema:
            type: string
        - name: fuel_type_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Available years
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
        "422":
          description: Missing required params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: brand_name, model and fuel_type_id are required

  /me/cars:
    get:
      tags: [UserCars]
      summary: Get current user cars
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cars assigned to current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
    post:
      tags: [UserCars]
      summary: Assign car to current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCarCreateRequest"
      responses:
        "201":
          description: Assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorsResponse"

  /feedbacks:
    get:
      tags: [Feedbacks]
      summary: Get all feedbacks
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feedback"
    post:
      tags: [Feedbacks]
      summary: Create feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackCreateRequest"
      responses:
        "201":
          description: Feedback created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorsResponse"

  /directions:
    get:
      tags: [Directions]
      summary: Get driving route between two points
      description: |
        Returns Mapbox Directions API v5 JSON for the given coordinates, with each route
        augmented by `distance_km` (distance in kilometres, two decimal places) derived from
        Mapbox `distance` in metres.
        **Only authenticated users** may call this endpoint (same JWT as `/me/cars`).
      security:
        - bearerAuth: []
      parameters:
        - name: start_lat
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Start latitude (-90..90)
        - name: start_lng
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Start longitude (-180..180)
        - name: end_lat
          in: query
          required: true
          schema:
            type: number
            format: float
          description: End latitude (-90..90)
        - name: end_lng
          in: query
          required: true
          schema:
            type: number
            format: float
          description: End longitude (-180..180)
        - name: via_lat
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Optional waypoint latitude (-90..90); use with `via_lng`
        - name: via_lng
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Optional waypoint longitude (-180..180); use with `via_lat`
      responses:
        "200":
          description: Mapbox Directions success payload (`code` is typically `Ok`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapboxDirectionsResponse"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
        "422":
          description: Invalid or missing coordinates, Mapbox error, or missing Mapbox configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectionsErrorResponse"

  /geocode/reverse:
    get:
      tags: [Geocoding]
      summary: Reverse geocode coordinates to a place label
      description: |
        Uses Mapbox Geocoding API (same `MAPBOX_ACCESS_TOKEN` as directions). Returns a human-readable
        `place_name` as `label`, or `null` if no result. Requires JWT.
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Latitude (-90..90)
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Longitude (-180..180)
      responses:
        "200":
          description: Geocoding result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseGeocodeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid or missing parameters or Mapbox error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectionsErrorResponse"

  /emissions/calculate:
    post:
      tags: [Emissions]
      summary: Calculate trip CO2 emissions for one of current user cars
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmissionCalculationRequest"
      responses:
        "200":
          description: Emissions calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmissionCalculationResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
        "404":
          description: Car not found for current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Car not found
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_car_id:
                  value:
                    error: car_id is required
                invalid_distance:
                  value:
                    error: Distance must be a valid number

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      required: [id, email, username, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        username:
          type: string
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: user123
        password:
          type: string
          format: password
          example: Password1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthSuccessResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: JWT token to be sent as `Authorization: Bearer <token>`.
        country:
          type: string
          nullable: true
          description: Country resolved from the client IP via GeoIP; `null` if unavailable.
          example: Lithuania
        city:
          type: string
          nullable: true
          description: City resolved from the client IP via GeoIP; `null` if unavailable.
          example: Vilnius
        latitude:
          type: number
          format: double
          nullable: true
          description: Latitude resolved from the client IP; `null` if unavailable.
          example: 54.6872
        longitude:
          type: number
          format: double
          nullable: true
          description: Longitude resolved from the client IP; `null` if unavailable.
          example: 25.2797
        login_ip:
          type: string
          nullable: true
          description: The public IP the server observed for this login request.
          example: 8.8.8.8

    FuelType:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    CarCreateRequest:
      type: object
      required: [brand_name, model, fuel_type_id, year, co2_emission]
      properties:
        brand_name:
          type: string
        model:
          type: string
        fuel_type_id:
          type: integer
        year:
          type: integer
        co2_emission:
          type: number
          format: float

    CarRecord:
      type: object
      required: [id, brand_name, model, fuel_type_id, year, co2_emission, created_at, updated_at]
      properties:
        id:
          type: integer
        brand_name:
          type: string
        model:
          type: string
        fuel_type_id:
          type: integer
        year:
          type: integer
        co2_emission:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CarResponse:
      type: object
      required: [id, brand_name, model, year, co2_emission, fuel_type]
      properties:
        id:
          type: integer
        brand_name:
          type: string
        model:
          type: string
        year:
          type: integer
        co2_emission:
          type: number
          format: float
        fuel_type:
          $ref: "#/components/schemas/FuelType"

    UserCarCreateRequest:
      type: object
      required: [car_id]
      properties:
        car_id:
          type: integer

    Feedback:
      type: object
      required: [id, comment, rating, created_at, updated_at]
      properties:
        id:
          type: integer
        comment:
          type: string
        rating:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FeedbackCreateRequest:
      type: object
      required: [comment, rating]
      properties:
        comment:
          type: string
        rating:
          type: integer

    EmissionCalculationRequest:
      type: object
      required: [car_id, distance_km]
      properties:
        car_id:
          type: integer
        distance_km:
          type: number
          format: float

    EmissionCalculationResponse:
      type: object
      required: [distance_km, emission_rate_g_per_km, total_emission_g, total_emission_kg]
      properties:
        distance_km:
          type: number
          format: float
        emission_rate_g_per_km:
          type: number
          format: float
        total_emission_g:
          type: number
          format: float
        total_emission_kg:
          type: number
          format: float

    ReverseGeocodeResponse:
      type: object
      required: [label]
      properties:
        label:
          type: string
          nullable: true
          description: Mapbox `place_name` for the nearest feature, or null if none.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ValidationErrorsResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: object
          additionalProperties:
            type: string

    MapboxDirectionsResponse:
      type: object
      description: |
        Mapbox Directions API v5 JSON. Each element of `routes` includes Mapbox fields
        (e.g. `distance` in metres, `duration` in seconds, `geometry`) plus server-added
        `distance_km` (kilometres, rounded to two decimals).
      properties:
        code:
          type: string
          example: Ok
        routes:
          type: array
          items:
            type: object
            properties:
              distance:
                type: number
                description: Route length in metres (Mapbox)
              distance_km:
                type: number
                description: Same length in kilometres, rounded to two decimal places
              duration:
                type: number
            additionalProperties: true
      additionalProperties: true

    DirectionsErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            type: string
